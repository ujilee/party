<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이종열님 환갑잔치 초대장</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#4EAAD4;--sky2:#3090BC;--sky-light:#EBF7FC;--sky-border:#90CDE8;
  --rose:#c0696a;--rose-light:#fdf0f0;
  --bg:#f2f2f2;--bg2:#fff;--bg3:#e4edf2;
  --text:#1c2d38;--text2:#4d6a7a;--text3:#8aaabb;
  --border:#ccdde8;--border2:#a8c8d8;
  --green:#3a7d44;--green-light:#eef6f0;
  --radius:14px;
}
html{scroll-behavior:smooth}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.screen{display:none;animation:fadeIn .3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.top-nav{
  position:sticky;top:0;z-index:50;
  background:rgba(242,242,242,0.94);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1.25rem;
}
.nav-logo{font-size:.95rem;font-weight:700;color:var(--sky);letter-spacing:-.01em;white-space:nowrap}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:.35rem .65rem;border-radius:8px;border:none;background:transparent;font-size:.78rem;color:var(--text2);cursor:pointer;transition:background .2s,color .2s}
.nav-tab:hover{background:var(--sky-light);color:var(--sky)}
.nav-tab.active{background:var(--sky-light);color:var(--sky);font-weight:600}
.container{max-width:480px;margin:0 auto;padding:0 0 4rem}

/* HERO */
.hero-photo{width:100%;height:280px;position:relative;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#b8dff0 0%,#7ec8e3 40%,#3a8ec0 100%)}
.hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:none}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.05) 0%,rgba(0,0,0,0.52) 100%)}
.hero-inner{z-index:1;text-align:center;padding:1.5rem 1.5rem 1.75rem;width:100%}
.hero-name{font-size:1.75rem;font-weight:700;color:#fff;letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,0.35)}
.hero-sub{font-size:.9rem;color:rgba(255,255,255,0.92);margin-top:.4rem;text-shadow:0 1px 4px rgba(0,0,0,0.3)}

.invite-body{padding:1.5rem 1.25rem}
.invite-title{text-align:center;margin-bottom:1.25rem}
.invite-title h2{font-size:1.2rem;font-weight:700;color:var(--text);line-height:1.4}
.invite-title p{font-size:.88rem;color:var(--text2);margin-top:.5rem;line-height:1.75}
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1rem}
.info-row{display:flex;align-items:flex-start;gap:.75rem;padding:.5rem 0}
.info-row+.info-row{border-top:1px solid var(--border)}
.info-icon{font-size:1.1rem;margin-top:.1rem;flex-shrink:0}
.info-label{font-size:.75rem;color:var(--text3);margin-bottom:.15rem}
.info-val{font-size:.9rem;font-weight:500;color:var(--text)}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--text3);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.action-btns{display:flex;flex-direction:column;gap:.6rem}
.btn{width:100%;padding:.85rem;border-radius:12px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-sky{background:var(--sky);color:#fff}.btn-sky:hover{background:var(--sky2)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text2)}.btn-outline:hover{border-color:var(--sky);color:var(--sky)}
.btn-rose{background:var(--rose);color:#fff}.btn-rose:hover{opacity:.88}
.btn-sm{padding:.55rem 1rem;width:auto;font-size:.85rem;border-radius:9px}

/* FORMS */
.form-section{padding:1.25rem}
.form-header{text-align:center;margin-bottom:1.5rem}
.form-header h2{font-size:1.15rem;font-weight:700}
.form-header p{font-size:.85rem;color:var(--text2);margin-top:.3rem}
.form-group{margin-bottom:1.1rem}
.form-label{font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:.45rem;display:block}
.form-input{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:10px;font-size:.92rem;font-family:inherit;background:var(--bg2);color:var(--text);transition:border-color .2s;outline:none}
.form-input:focus{border-color:var(--sky)}
textarea.form-input{resize:vertical;min-height:90px}
.attend-btns{display:flex;gap:.6rem}
.attend-btn{flex:1;padding:.65rem .5rem;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--text2)}
.attend-btn.sel-yes{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:700}
.attend-btn.sel-no{border-color:var(--rose);background:var(--rose-light);color:var(--rose);font-weight:700}
.attend-btn.sel-maybe{border-color:var(--sky);background:var(--sky-light);color:var(--sky);font-weight:700}
.attend-btn.sel-sky{border-color:var(--sky);background:var(--sky-light);color:var(--sky);font-weight:700}
.count-row{display:flex;align-items:center;gap:.75rem}
.count-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg2);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;transition:border-color .2s}
.count-btn:hover{border-color:var(--sky);color:var(--sky)}
.count-val{font-size:1.1rem;font-weight:700;min-width:28px;text-align:center}
.rel-chips{display:flex;flex-wrap:wrap;gap:.5rem}
.rel-chip{padding:.35rem .85rem;border-radius:100px;border:1.5px solid var(--border);background:var(--bg2);font-size:.82rem;cursor:pointer;transition:all .2s;color:var(--text2)}
.rel-chip.sel{border-color:var(--sky);background:var(--sky-light);color:var(--sky);font-weight:600}
.guide-box{background:var(--sky-light);border:1px solid var(--sky-border);border-radius:10px;padding:.75rem 1rem;margin-top:.6rem;font-size:.82rem;color:#1e5a78;line-height:1.6}

/* BOOK */
.book-header{padding:1.5rem 1.25rem 1rem;text-align:center;background:linear-gradient(180deg,var(--sky-light) 0%,var(--bg) 100%)}
.book-header h2{font-size:1.15rem;font-weight:700}
.book-header p{font-size:.83rem;color:var(--text2);margin-top:.3rem}
.filter-row{display:flex;gap:.5rem;padding:.75rem 1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-chip{flex-shrink:0;padding:.35rem .9rem;border-radius:100px;border:1.5px solid var(--border);background:var(--bg2);font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap;color:var(--text2)}
.filter-chip.active{border-color:var(--sky);background:var(--sky-light);color:var(--sky);font-weight:600}
.msg-grid{padding:.5rem 1.25rem;display:flex;flex-direction:column;gap:.9rem}
.msg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.2rem;position:relative;overflow:hidden}
.msg-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sky)}
.msg-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
.msg-name{font-size:.92rem;font-weight:600}
.msg-rel{font-size:.75rem;color:var(--text3);margin-top:.05rem}
.msg-title{font-size:.88rem;font-weight:600;color:var(--sky);margin-bottom:.4rem}
.msg-body{font-size:.88rem;color:var(--text2);line-height:1.75}

/* ADMIN */
.admin-section{padding:1.25rem}
.admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:700;color:var(--sky)}
.stat-card .lbl{font-size:.75rem;color:var(--text3);margin-top:.15rem}
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.admin-card-header{padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.admin-card-header h3{font-size:.95rem;font-weight:700}
.badge{padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-rose{background:var(--rose-light);color:var(--rose)}
.badge-sky{background:var(--sky-light);color:var(--sky)}
.rsvp-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.1rem;font-size:.88rem}
.rsvp-row+.rsvp-row{border-top:1px solid var(--border)}
.rsvp-name{font-weight:600}
.rsvp-detail{font-size:.78rem;color:var(--text3);margin-top:.1rem}
